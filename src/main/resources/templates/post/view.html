<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head(${post.title})}"></th:block>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .ql-editor { padding: 0; }
    .post-content { white-space: normal; }
    .post-content p  { margin-bottom: .6em; }
    .post-content h1 { font-size: 1.8em; font-weight: 800; margin: 1em 0 .4em; }
    .post-content h2 { font-size: 1.4em; font-weight: 700; margin: .9em 0 .4em; }
    .post-content h3 { font-size: 1.1em; font-weight: 700; margin: .8em 0 .3em; }
    .post-content ul, .post-content ol { padding-left: 24px; margin: .5em 0; }
    .post-content li { margin-bottom: .25em; }
    .post-content blockquote {
      border-left: 4px solid var(--accent);
      margin: 12px 0; padding: 8px 16px;
      background: var(--accent-light);
      border-radius: 0 8px 8px 0;
      color: var(--text-sub);
    }
    .post-content pre {
      background: #1e1e1e; color: #d4d4d4;
      border-radius: 8px; padding: 16px;
      overflow-x: auto; font-size: .88em; margin: 10px 0;
    }
    .post-content code { background: #f0edfb; padding: 2px 5px; border-radius: 4px; font-size: .88em; }
    .post-content pre code { background: none; padding: 0; }
    .post-content img { max-width: 100%; height: auto; border-radius: 10px; margin: 10px 0; display: block; }
    .post-content iframe { max-width: 100%; width: 100%; aspect-ratio: 16/9; border-radius: 10px; margin: 10px 0; border: none; }
    .post-content video { max-width: 100%; border-radius: 10px; margin: 10px 0; }
    .post-content a { color: var(--accent); text-decoration: underline; }
    .post-content .ql-align-center { text-align: center; }
    .post-content .ql-align-right  { text-align: right; }
    .post-content .ql-align-justify { text-align: justify; }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: topbar}"></th:block>

<div class="layout">
  <th:block th:replace="~{fragments/header :: sidebar('cat-' + ${post.category.name()})}"></th:block>

  <main class="main">
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <article class="detail-card">
      <!-- 헤더 -->
      <div class="post-detail-header">
        <span th:class="'chip chip-' + ${post.category.name()}" th:text="${post.category.label}">카테고리</span>
        <h1 class="post-detail-title" th:text="${post.title}">제목</h1>
        <div class="post-detail-meta">
          <span class="avatar avatar-sm"
                th:data-avatar="${post.user.nickname}"
                th:style="${post.user.profileImage != null} ? 'background-image:url(' + ${post.user.profileImage} + ')' : ''"
                th:text="${post.user.profileImage == null} ? ${#strings.substring(post.user.nickname,0,1)} : ''"></span>
          <strong th:text="${post.user.nickname}">작성자</strong>
          <span th:text="${#temporals.format(post.createdAt,'yyyy.MM.dd HH:mm')}">날짜</span>
          <span>조회 <span th:text="${post.viewCount}">0</span></span>
        </div>
      </div>

      <!-- 본문 -->
      <div class="post-content ql-editor" th:utext="${safeContent}"></div>

      <!-- 액션 -->
      <div class="post-actions">
        <button id="like-btn" class="btn-icon" th:classappend="${liked} ? 'liked'"
                th:data-post-id="${post.id}">
          <span class="like-icon" th:text="${liked} ? '♥' : '♡'">♡</span>
          좋아요 <span id="like-count" th:text="${post.likeCount}">0</span>
        </button>
        <div class="spacer"></div>
        <a th:href="@{/posts}" class="btn btn-ghost btn-sm">목록</a>
        <th:block th:if="${session.loginUser != null and session.loginUser.id == post.user.id}">
          <a th:href="@{/post/{id}/edit(id=${post.id})}" class="btn btn-ghost btn-sm">수정</a>
          <form th:action="@{/post/{id}/delete(id=${post.id})}" method="post" style="display:inline;"
                onsubmit="return confirm('정말 삭제하시겠습니까?')">
            <button type="submit" class="btn btn-danger btn-sm">삭제</button>
          </form>
        </th:block>
      </div>
    </article>

    <!-- 댓글 -->
    <section class="detail-card comments-section" style="margin-top:20px;">
      <h2 class="comments-title">댓글 <span th:text="${#lists.size(comments)}">0</span>개</h2>

      <div th:each="comment : ${comments}" class="comment-item">
        <span class="avatar"
              th:data-avatar="${comment.user.nickname}"
              th:style="${comment.user.profileImage != null} ? 'background-image:url(' + ${comment.user.profileImage} + ')' : ''"
              th:text="${comment.user.profileImage == null} ? ${#strings.substring(comment.user.nickname,0,1)} : ''"></span>
        <div class="comment-body">
          <span class="comment-author" th:text="${comment.user.nickname}">작성자</span>
          <span class="comment-time" th:text="${#temporals.format(comment.createdAt,'yyyy.MM.dd HH:mm')}">날짜</span>
          <p class="comment-text" th:text="${comment.content}">내용</p>
        </div>
        <form th:if="${session.loginUser != null and session.loginUser.id == comment.user.id}"
              th:action="@{/comment/{id}/delete(id=${comment.id})}" method="post">
          <input type="hidden" name="postId" th:value="${post.id}">
          <button type="submit" class="btn btn-danger btn-sm">삭제</button>
        </form>
      </div>

      <div th:if="${#lists.isEmpty(comments)}" class="empty" style="padding:28px 0;">첫 댓글을 남겨보세요!</div>

      <div th:if="${session.loginUser != null}">
        <form th:action="@{/post/{id}/comment(id=${post.id})}" method="post" class="comment-form">
          <textarea name="content" class="comment-textarea" rows="2"
                    placeholder="댓글을 입력하세요" required data-autoresize></textarea>
          <button type="submit" class="btn btn-primary">등록</button>
        </form>
      </div>
      <p th:if="${session.loginUser == null}" style="margin-top:18px;color:var(--text-sub);font-size:.875rem;">
        댓글을 작성하려면 <a th:href="@{/user/login}" style="color:var(--accent);font-weight:700;">로그인</a>하세요.
      </p>
    </section>
  </main>
</div>

<th:block th:replace="~{fragments/header :: footer}"></th:block>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
