<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head(${postId != null} ? '글 수정' : '글쓰기')}"></th:block>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    /* ── Quill 툴바 디자인 커스텀 ── */
    .ql-toolbar.ql-snow {
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: var(--radius-btn) var(--radius-btn) 0 0;
      background: #fafaf9;
      padding: 10px 12px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ql-container.ql-snow {
      border: 1px solid var(--border);
      border-radius: 0 0 var(--radius-btn) var(--radius-btn);
      font-family: 'Pretendard', sans-serif;
      font-size: 1rem;
    }
    .ql-editor {
      min-height: 380px;
      line-height: 1.8;
      padding: 18px 20px;
      color: var(--text);
    }
    .ql-editor.ql-blank::before {
      color: var(--text-sub);
      font-style: normal;
    }
    /* 커스텀 폰트 적용 */
    .ql-font-pretendard        { font-family: 'Pretendard', sans-serif; }
    .ql-font-nanum-gothic      { font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif; }
    .ql-font-noto-serif        { font-family: 'Noto Serif KR', 'Batang', serif; }
    .ql-font-monospace         { font-family: 'Fira Code', 'D2Coding', monospace; }

    /* 폰트 셀렉터 표시 이름 */
    .ql-snow .ql-picker.ql-font .ql-picker-label::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item::before { content: '기본'; }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value=pretendard]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value=pretendard]::before { content: 'Pretendard'; }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value=nanum-gothic]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value=nanum-gothic]::before { content: '나눔고딕'; }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value=noto-serif]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value=noto-serif]::before { content: '명조'; }
    .ql-snow .ql-picker.ql-font .ql-picker-label[data-value=monospace]::before,
    .ql-snow .ql-picker.ql-font .ql-picker-item[data-value=monospace]::before { content: '코드'; }

    /* 사이즈 셀렉터 표시 이름 */
    .ql-snow .ql-picker.ql-size .ql-picker-label::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item::before { content: '보통'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value='12px']::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value='12px']::before { content: '작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value='16px']::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value='16px']::before { content: '보통'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value='20px']::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value='20px']::before { content: '크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value='28px']::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value='28px']::before { content: '매우 크게'; }

    /* 업로드 진행 표시 */
    .upload-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }
    .upload-overlay.show { display: flex; }
    .upload-spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .upload-progress-bar {
      width: 260px; height: 6px;
      background: rgba(255,255,255,.3);
      border-radius: 3px;
      overflow: hidden;
    }
    .upload-progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 3px;
      width: 0%;
      transition: width .2s;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: topbar}"></th:block>

<!-- 업로드 오버레이 -->
<div class="upload-overlay" id="uploadOverlay">
  <div class="upload-spinner"></div>
  <span id="uploadLabel">업로드 중...</span>
  <div class="upload-progress-bar" id="uploadProgressBar" style="display:none;">
    <div class="upload-progress-fill" id="uploadProgressFill"></div>
  </div>
</div>

<div class="layout">
  <th:block th:replace="~{fragments/header :: sidebar('')}"></th:block>
  <main class="main">

    <div class="page-header" style="margin-bottom:24px;">
      <h1 class="page-title" th:text="${postId != null} ? '글 수정' : '새 글 작성'">글쓰기</h1>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
      <div class="form-card">
        <form id="postForm"
              th:action="${postId != null} ? @{/post/{id}/edit(id=${postId})} : @{/post/create}"
              method="post">

          <!-- 카테고리 -->
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <div class="cat-select-group">
              <th:block th:each="cat : ${categories}">
                <input type="radio" name="category"
                       th:id="'cat-' + ${cat.name()}"
                       th:value="${cat.name()}"
                       th:checked="${postDto.category == cat.name()
                         or (postDto.category == null and cat.name() == 'FREE')}">
                <label th:for="'cat-' + ${cat.name()}" th:text="${cat.label}">카테고리</label>
              </th:block>
            </div>
          </div>

          <!-- 제목 -->
          <div class="form-group">
            <label for="title" class="form-label">제목 <span style="color:var(--danger)">*</span></label>
            <input type="text" id="title" name="title" class="form-input"
                   th:value="${postDto.title}"
                   placeholder="제목을 입력하세요" required>
          </div>

          <!-- 에디터 -->
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">내용 <span style="color:var(--danger)">*</span></label>
            <div id="quill-editor"></div>
            <input type="hidden" id="content" name="content">
          </div>

        </form>

        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px;">
          <a th:href="@{/posts}" class="btn btn-ghost">취소</a>
          <button type="button" onclick="submitPost()"
                  class="btn btn-primary" style="padding:10px 28px;"
                  th:text="${postId != null} ? '수정 완료' : '등록하기'">등록</button>
        </div>
      </div>
    </div>

  </main>
</div>

<th:block th:replace="~{fragments/header :: footer}"></th:block>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script th:inline="javascript">
/* ── 커스텀 폰트 등록 ── */
const Font = Quill.import('formats/font');
Font.whitelist = ['pretendard', 'nanum-gothic', 'noto-serif', 'monospace'];
Quill.register(Font, true);

/* ── 커스텀 사이즈 등록 ── */
const Size = Quill.import('attributors/style/size');
Size.whitelist = ['12px', '14px', '16px', '18px', '20px', '24px', '28px', '32px'];
Quill.register(Size, true);

/* ── 커스텀 Video Blot: /uploads/ 경로는 <video>, 외부 URL은 <iframe> ── */
const BlockEmbed = Quill.import('blots/block/embed');
class VideoBlot extends BlockEmbed {
  static create(value) {
    let node;
    if (value && (value.startsWith('/uploads/') || value.startsWith('blob:'))) {
      node = document.createElement('video');
      node.setAttribute('src', value);
      node.setAttribute('controls', true);
      node.setAttribute('preload', 'metadata');
      node.style.maxWidth = '100%';
      node.style.borderRadius = '10px';
      node.style.margin = '10px 0';
    } else {
      node = document.createElement('iframe');
      node.setAttribute('src', value);
      node.setAttribute('frameborder', '0');
      node.setAttribute('allowfullscreen', true);
      node.style.width = '100%';
      node.style.aspectRatio = '16/9';
      node.style.borderRadius = '10px';
      node.style.margin = '10px 0';
    }
    return node;
  }
  static value(node) {
    return node.getAttribute('src');
  }
}
VideoBlot.blotName = 'video';
VideoBlot.tagName = ['iframe', 'video'];
Quill.register(VideoBlot, true);

/* ── 에디터 초기화 ── */
const quill = new Quill('#quill-editor', {
  theme: 'snow',
  placeholder: '내용을 자유롭게 입력하세요...',
  modules: {
    toolbar: {
      container: [
        [{ font: ['', 'pretendard', 'nanum-gothic', 'noto-serif', 'monospace'] }],
        [{ size: ['12px', '14px', false, '20px', '24px', '28px', '32px'] }],
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ color: [] }, { background: [] }],
        [{ align: [] }],
        [{ list: 'ordered' }, { list: 'bullet' }, { indent: '-1' }, { indent: '+1' }],
        ['blockquote', 'code-block'],
        ['link', 'image', 'video'],
        ['clean']
      ],
      handlers: { image: imageUploadHandler }
    }
  }
});

/* ── 수정 모드: 기존 내용 로드 ── */
const existingContent = /*[[${postDto.content}]]*/ '';
if (existingContent) {
  quill.root.innerHTML = existingContent;
}

/* ── 공통 업로드 유틸 ── */
function showOverlay(label, showProgress) {
  document.getElementById('uploadLabel').textContent = label;
  const bar = document.getElementById('uploadProgressBar');
  bar.style.display = showProgress ? 'block' : 'none';
  setProgress(0);
  document.getElementById('uploadOverlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('uploadOverlay').classList.remove('show');
}
function setProgress(pct) {
  document.getElementById('uploadProgressFill').style.width = pct + '%';
}

function uploadFile(url, file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
    };
    xhr.onload = () => {
      try { resolve(JSON.parse(xhr.responseText)); }
      catch { reject(new Error('응답 파싱 실패')); }
    };
    xhr.onerror = () => reject(new Error('네트워크 오류'));
    const fd = new FormData();
    fd.append('file', file);
    xhr.send(fd);
  });
}

/* ── 이미지 업로드 핸들러 ── */
function imageUploadHandler() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    showOverlay('이미지 업로드 중...', false);
    try {
      const data = await uploadFile('/upload/image', file, () => {});
      if (data.url) {
        const range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', data.url);
        quill.setSelection(range.index + 1);
      } else {
        alert('이미지 업로드 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (e) {
      alert('이미지 업로드 중 오류가 발생했습니다.');
    } finally {
      hideOverlay();
    }
  };
  input.click();
}

/* ── 동영상 로컬 파일 업로드 핸들러 ── */
quill.getModule('toolbar').addHandler('video', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'video/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 1024 * 1024 * 1024) {
      alert('동영상 파일은 1GB 이하만 업로드 가능합니다.');
      return;
    }
    showOverlay('동영상 업로드 중...', true);
    try {
      const data = await uploadFile('/upload/video', file, pct => setProgress(pct));
      if (data.url) {
        const range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'video', data.url);
        quill.setSelection(range.index + 1);
      } else {
        alert('동영상 업로드 실패: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (e) {
      alert('동영상 업로드 중 오류가 발생했습니다.');
    } finally {
      hideOverlay();
    }
  };
  input.click();
});

/* ── 폼 제출 ── */
function submitPost() {
  const content = quill.root.innerHTML;
  if (content === '<p><br></p>' || content.trim() === '') {
    alert('내용을 입력해주세요.');
    quill.focus();
    return;
  }
  document.getElementById('content').value = content;
  document.getElementById('postForm').submit();
}
</script>
</body>
</html>
