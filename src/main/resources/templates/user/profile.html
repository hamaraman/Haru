<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head('회원정보 수정')}"></th:block>
  <style>
    .profile-edit-wrap {
      max-width: 600px;
      margin: 0 auto;
    }
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .section-label {
      font-size: .8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-sub);
      margin-bottom: 16px;
    }
    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 700;
    }
    .badge-naver  { background: #ebfbee; color: var(--naver); }
    .badge-local  { background: var(--accent-light); color: var(--accent); }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: .9rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key { color: var(--text-sub); font-size: .85rem; }
    .info-val { font-weight: 600; }
    .pw-section { background: #fafafa; border-radius: 12px; padding: 20px; margin-top: 4px; }
    .pw-section .form-group { margin-bottom: 14px; }
    .pw-section .form-group:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<main class="page-main">
  <div class="container profile-edit-wrap">

    <div class="page-header" style="margin-bottom:24px;">
      <div>
        <h1 class="page-title">회원정보 수정</h1>
        <p class="page-sub">프로필과 비밀번호를 변경할 수 있어요</p>
      </div>
      <a th:href="@{/user/mypage}" class="btn btn-ghost btn-sm">← 마이페이지</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <form th:action="@{/user/profile}" method="post">

      <!-- 기본 정보 카드 -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body">
          <p class="section-label">기본 정보</p>

          <!-- 프로필 미리보기 -->
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;">
            <span class="avatar avatar-lg"
                  th:data-avatar="${user.nickname}"
                  th:text="${#strings.substring(user.nickname,0,1)}"></span>
            <div>
              <div style="font-weight:700;font-size:1.05rem;" th:text="${user.nickname}"></div>
              <div style="color:var(--text-sub);font-size:.85rem;" th:text="${user.email}"></div>
              <span class="provider-badge"
                    th:classappend="${user.provider == 'naver'} ? 'badge-naver' : 'badge-local'">
                <span th:text="${user.provider == 'naver'} ? 'N 네이버' : '✉ 이메일'"></span>
              </span>
            </div>
          </div>

          <!-- 실명 -->
          <div class="form-group">
            <label for="name" class="form-label">실명</label>
            <input type="text" id="name" name="name" class="form-input"
                   th:value="${user.name}"
                   placeholder="실명을 입력하세요 (선택사항)"
                   maxlength="30">
            <p style="font-size:.78rem;color:var(--text-sub);margin-top:4px;">
              실명은 본인 확인 용도로만 사용되며 다른 사용자에게 표시되지 않습니다.
            </p>
          </div>

          <!-- 휴대폰 번호 -->
          <div class="form-group">
            <label for="phone" class="form-label">휴대폰 번호</label>
            <input type="tel" id="phone" name="phone" class="form-input"
                   th:value="${user.phone}"
                   placeholder="010-0000-0000"
                   maxlength="20"
                   oninput="this.value=this.value.replace(/[^0-9-]/g,'')">
          </div>

          <!-- 닉네임 -->
          <div class="form-group" style="margin-bottom:0;">
            <label for="nickname" class="form-label">닉네임 <span style="color:var(--danger)">*</span></label>
            <input type="text" id="nickname" name="nickname" class="form-input"
                   th:value="${user.nickname}"
                   placeholder="닉네임을 입력하세요"
                   required maxlength="30">
          </div>
        </div>
      </div>

      <!-- 읽기 전용 정보 -->
      <div class="card" style="margin-bottom:16px;">
        <div class="card-body">
          <p class="section-label">계정 정보</p>
          <div class="info-row">
            <span class="info-key">이메일</span>
            <span class="info-val" th:text="${user.email}"></span>
          </div>
          <div class="info-row">
            <span class="info-key">가입일</span>
            <span class="info-val"
                  th:text="${#temporals.format(user.createdAt,'yyyy년 MM월 dd일')}"></span>
          </div>
          <div class="info-row" style="border-bottom:none;">
            <span class="info-key">로그인 방식</span>
            <span class="info-val"
                  th:text="${user.provider == 'naver'} ? '네이버 소셜 로그인' : '이메일 로그인'"></span>
          </div>
        </div>
      </div>

      <!-- 비밀번호 변경 (이메일 로그인만) -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card-body">
          <p class="section-label">비밀번호 변경</p>

          <div th:if="${user.provider == 'naver'}"
               style="color:var(--text-sub);font-size:.875rem;padding:8px 0;">
            네이버 소셜 로그인 계정은 비밀번호를 변경할 수 없습니다.
          </div>

          <div th:if="${user.provider != 'naver'}" class="pw-section">
            <p style="font-size:.82rem;color:var(--text-sub);margin-bottom:16px;">
              변경하지 않으려면 모두 비워두세요.
            </p>
            <div class="form-group">
              <label for="currentPassword" class="form-label">현재 비밀번호</label>
              <input type="password" id="currentPassword" name="currentPassword"
                     class="form-input" placeholder="현재 비밀번호">
            </div>
            <div class="form-group">
              <label for="newPassword" class="form-label">새 비밀번호</label>
              <input type="password" id="newPassword" name="newPassword"
                     class="form-input" placeholder="새 비밀번호 (8자 이상 권장)">
            </div>
            <div class="form-group">
              <label for="newPasswordConfirm" class="form-label">새 비밀번호 확인</label>
              <input type="password" id="newPasswordConfirm" name="newPasswordConfirm"
                     class="form-input" placeholder="새 비밀번호를 다시 입력하세요">
            </div>
          </div>
        </div>
      </div>

      <!-- 저장 버튼 -->
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <a th:href="@{/user/mypage}" class="btn btn-ghost">취소</a>
        <button type="submit" class="btn btn-primary" style="padding:10px 28px;">
          저장하기
        </button>
      </div>

    </form>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
