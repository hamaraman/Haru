<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head('마이페이지')}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: topbar}"></th:block>

<div class="layout">
  <th:block th:replace="~{fragments/header :: sidebar('mypage')}"></th:block>

  <main class="main">

    <!-- 프로필 카드 -->
    <div class="profile-card">
      <span class="avatar avatar-lg"
            th:data-avatar="${user.nickname}"
            th:style="${user.profileImage != null} ? 'background-image:url(' + ${user.profileImage} + ')' : ''"
            th:text="${user.profileImage == null} ? ${#strings.substring(user.nickname,0,1)} : ''"></span>
      <div class="profile-info">
        <div class="profile-name" th:text="${user.nickname}">닉네임</div>
        <div class="profile-email" th:text="${user.email}">이메일</div>

        <div class="stats-row">
          <div class="stat-item">
            <div class="stat-num" th:text="${stats.postCount}">0</div>
            <div class="stat-label">작성글</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" th:text="${stats.commentCount}">0</div>
            <div class="stat-label">댓글</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" th:text="${stats.totalLikes}">0</div>
            <div class="stat-label">받은 좋아요</div>
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
        <a th:href="@{/user/settings}" class="btn btn-primary btn-sm">설정</a>
        <a th:href="@{/user/logout}"  class="btn btn-ghost btn-sm">로그아웃</a>
      </div>
    </div>

    <!-- 탭 네비 -->
    <div class="tab-nav">
      <a th:href="@{/user/mypage(tab='posts')}"
         th:classappend="${tab == 'posts' or tab == null} ? 'active'"
         class="tab-btn">내가 작성한 글</a>
      <a th:href="@{/user/mypage(tab='bookmarks')}"
         th:classappend="${tab == 'bookmarks'} ? 'active'"
         class="tab-btn">저장한 글</a>
    </div>

    <!-- 내가 작성한 글 탭 -->
    <div th:if="${tab == 'posts' or tab == null}">
      <div class="feed-card" th:if="${!posts.content.isEmpty()}">
        <div class="post-list">
          <div th:each="post : ${posts.content}" class="post-item" th:data-href="@{/post/{id}(id=${post.id})}">
            <span th:class="'chip chip-' + ${post.category.name()}" th:text="${post.category.label}">카테고리</span>
            <span class="post-title" th:text="${post.title}">제목</span>
            <div class="post-meta">
              <span class="ico like"><img th:src="@{/images/icons/icon-heart.png}" class="icon-stat icon-danger" alt=""> <span th:text="${post.likeCount}">0</span></span>
              <span class="ico"><img th:src="@{/images/icons/icon-eye.png}" class="icon-stat icon-themed" alt=""> <span th:text="${post.viewCount}">0</span></span>
              <span class="ico" th:text="${#temporals.format(post.createdAt,'MM.dd')}">날짜</span>
            </div>
          </div>
        </div>
      </div>
      <div th:if="${posts.content.isEmpty()}" class="empty">아직 작성한 글이 없습니다.</div>

      <nav class="pagination" th:if="${posts.totalPages > 1}">
        <a th:href="@{/user/mypage(page=${currentPage-1},tab='posts')}" class="page-btn"
           th:classappend="${currentPage==1} ? 'disabled'">‹</a>
        <a th:each="i : ${#numbers.sequence(1, posts.totalPages)}"
           th:href="@{/user/mypage(page=${i},tab='posts')}" th:text="${i}" class="page-btn"
           th:classappend="${i==currentPage} ? 'active'">1</a>
        <a th:href="@{/user/mypage(page=${currentPage+1},tab='posts')}" class="page-btn"
           th:classappend="${currentPage==posts.totalPages} ? 'disabled'">›</a>
      </nav>
    </div>

    <!-- 저장한 글 탭 -->
    <div th:if="${tab == 'bookmarks'}">
      <div class="feed-card" th:if="${bookmarks != null and !bookmarks.content.isEmpty()}">
        <div class="post-list">
          <div th:each="bm : ${bookmarks.content}" class="post-item"
               th:data-href="@{/post/{id}(id=${bm.post.id})}">
            <span th:class="'chip chip-' + ${bm.post.category.name()}" th:text="${bm.post.category.label}">카테고리</span>
            <span class="post-title" th:text="${bm.post.title}">제목</span>
            <div class="post-meta">
              <span class="ico like"><img th:src="@{/images/icons/icon-heart.png}" class="icon-stat icon-danger" alt=""> <span th:text="${bm.post.likeCount}">0</span></span>
              <span class="ico"><img th:src="@{/images/icons/icon-eye.png}" class="icon-stat icon-themed" alt=""> <span th:text="${bm.post.viewCount}">0</span></span>
              <span class="ico" th:text="${#temporals.format(bm.createdAt,'MM.dd')}">날짜</span>
            </div>
          </div>
        </div>
      </div>
      <div th:if="${bookmarks == null or bookmarks.content.isEmpty()}" class="empty">저장한 글이 없습니다.</div>

      <nav class="pagination" th:if="${bookmarks != null and bookmarks.totalPages > 1}">
        <a th:href="@{/user/mypage(page=${currentPage-1},tab='bookmarks')}" class="page-btn"
           th:classappend="${currentPage==1} ? 'disabled'">‹</a>
        <a th:each="i : ${#numbers.sequence(1, bookmarks.totalPages)}"
           th:href="@{/user/mypage(page=${i},tab='bookmarks')}" th:text="${i}" class="page-btn"
           th:classappend="${i==currentPage} ? 'active'">1</a>
        <a th:href="@{/user/mypage(page=${currentPage+1},tab='bookmarks')}" class="page-btn"
           th:classappend="${currentPage==bookmarks.totalPages} ? 'disabled'">›</a>
      </nav>
    </div>

  </main>
</div>

<th:block th:replace="~{fragments/header :: footer}"></th:block>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
