<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head('게시글 목록')}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: navbar}"></th:block>

<main class="page-main">
  <div class="container">

    <!-- 알림 -->
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div>
        <h1 class="page-title">전체 글</h1>
        <p class="page-sub" th:text="'총 ' + ${total} + '개의 이야기'"></p>
      </div>
    </div>

    <!-- 카테고리 탭 -->
    <div class="cat-tabs">
      <a th:href="@{/(keyword=${keyword},searchType=${searchType},category='')}"
         th:classappend="${category == '' or category == null} ? 'active'"
         class="cat-tab">전체</a>
      <a th:each="cat : ${categories}"
         th:href="@{/(keyword=${keyword},searchType=${searchType},category=${cat.name()})}"
         th:classappend="${category == cat.name()} ? 'active'"
         th:text="${cat.label}"
         class="cat-tab">카테고리</a>
    </div>

    <!-- 검색 -->
    <form th:action="@{/}" method="get" class="search-bar">
      <input type="hidden" name="category" th:value="${category}">
      <select name="searchType" class="search-select">
        <option value="all"    th:selected="${searchType=='all'}">제목+작성자</option>
        <option value="title"  th:selected="${searchType=='title'}">제목</option>
        <option value="author" th:selected="${searchType=='author'}">작성자</option>
      </select>
      <input type="text" name="keyword" class="search-input"
             placeholder="검색어를 입력하세요" th:value="${keyword}">
      <button type="submit" class="btn btn-primary">검색</button>
      <a th:href="@{/(category=${category})}" class="btn btn-ghost">초기화</a>
    </form>

    <!-- 목록 -->
    <div class="post-list">
      <div th:each="post : ${posts}"
           class="post-item"
           th:data-href="@{/post/{id}(id=${post.id})}">
        <span th:class="'chip chip-' + ${post.category}"
              th:text="${post.categoryLabel}">카테고리</span>
        <span class="post-title" th:text="${post.title}">제목</span>
        <div class="post-meta">
          <span class="ico" title="댓글">💬 <span th:text="${post.commentCount}">0</span></span>
          <span class="ico" title="좋아요">♥ <span th:text="${post.likeCount}">0</span></span>
          <span class="ico" title="조회">👁 <span th:text="${post.viewCount}">0</span></span>
          <span th:text="${post.authorNickname}">작성자</span>
          <span th:text="${#temporals.format(post.createdAt,'MM.dd HH:mm')}">날짜</span>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(posts)}" class="empty">
        아직 게시글이 없습니다. 첫 이야기를 남겨보세요!
      </div>
    </div>

    <!-- 페이지네이션 -->
    <nav class="pagination" th:if="${totalPages > 1}">
      <a th:href="@{/(page=${currentPage-1},keyword=${keyword},searchType=${searchType},category=${category})}"
         class="page-btn"
         th:classappend="${currentPage==1} ? 'disabled'"
         th:aria-disabled="${currentPage==1}">‹</a>

      <a th:each="i : ${#numbers.sequence(1, totalPages)}"
         th:href="@{/(page=${i},keyword=${keyword},searchType=${searchType},category=${category})}"
         th:text="${i}"
         class="page-btn"
         th:classappend="${i==currentPage} ? 'active'"></a>

      <a th:href="@{/(page=${currentPage+1},keyword=${keyword},searchType=${searchType},category=${category})}"
         class="page-btn"
         th:classappend="${currentPage==totalPages} ? 'disabled'">›</a>
    </nav>

  </div>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
