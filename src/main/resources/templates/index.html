<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head('홈')}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: topbar}"></th:block>

<div class="layout has-widgets">
  <th:block th:replace="~{fragments/header :: sidebar('home')}"></th:block>

  <main class="main">

    <!-- 히어로 배너 -->
    <section class="hero">
      <div class="blob"></div>
      <span class="emoji">☕</span>
      <h1>매일 들르는 이야기,<br>하루에서 함께 나눠요</h1>
      <p>자유롭게 묻고, 답하고, 정보를 공유하는 공간. 오늘 하루는 어떤 이야기로 채울까요?</p>
      <a th:href="@{/posts}" class="cta">게시판 둘러보기 →</a>
    </section>

    <!-- 인기 게시글 -->
    <div class="section-head">
      <h2>🔥 인기 게시글</h2>
      <a th:href="@{/posts(sort='popular')}">더보기</a>
    </div>

    <div class="pop-grid" th:if="${!#lists.isEmpty(popularPosts)}">
      <div th:each="p : ${popularPosts}" class="pop-card" th:data-href="@{/post/{id}(id=${p.id})}">
        <div th:class="'pop-thumb t-' + ${p.category}" th:text="${p.categoryIcon}">💬</div>
        <div class="pop-body">
          <span th:class="'chip chip-' + ${p.category}" th:text="${p.categoryLabel}"
                style="align-self:flex-start">카테고리</span>
          <div class="pop-title" th:text="${p.title}">제목</div>
          <div class="pop-sum" th:text="${p.summary}">요약</div>
          <div class="pop-foot">
            <span class="author">
              <span class="avatar avatar-sm"
                    th:data-avatar="${p.authorNickname}"
                    th:style="${p.profileImage != null} ? 'background-image:url(' + ${p.profileImage} + ')' : ''"
                    th:text="${p.profileImage == null} ? ${#strings.substring(p.authorNickname,0,1)} : ''"></span>
              <span th:text="${p.authorNickname}">작성자</span>
            </span>
            <span class="stats">
              <span style="color:var(--danger)">♥ <span th:text="${p.likeCount}">0</span></span>
              <span>💬 <span th:text="${p.commentCount}">0</span></span>
            </span>
          </div>
        </div>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(popularPosts)}" class="empty">아직 게시글이 없습니다. 첫 이야기를 남겨보세요!</div>

    <!-- 최신 게시글 -->
    <div class="section-head">
      <h2>🕒 최신 게시글</h2>
      <a th:href="@{/posts(sort='latest')}">더보기</a>
    </div>

    <div class="feed-card" th:if="${!#lists.isEmpty(latestPosts)}">
      <div class="post-list">
        <div th:each="post : ${latestPosts}" class="post-item" th:data-href="@{/post/{id}(id=${post.id})}">
          <span th:class="'chip chip-' + ${post.category}" th:text="${post.categoryLabel}">카테고리</span>
          <span class="post-title" th:text="${post.title}">제목</span>
          <div class="post-meta">
            <span class="ico like">♥ <span th:text="${post.likeCount}">0</span></span>
            <span class="ico">💬 <span th:text="${post.commentCount}">0</span></span>
            <span class="ico" th:text="${post.authorNickname}">작성자</span>
            <span class="ico" th:text="${#temporals.format(post.createdAt,'MM.dd')}">날짜</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <th:block th:replace="~{fragments/header :: widgets}"></th:block>
</div>

<th:block th:replace="~{fragments/header :: footer}"></th:block>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
