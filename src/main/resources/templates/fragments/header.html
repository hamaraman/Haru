<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- HEAD fragment -->
<th:block th:fragment="head(title)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title} + ' — 하루'">하루</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</th:block>

<!-- NAV fragment -->
<header th:fragment="navbar" class="site-header">
  <div class="container inner">
    <a th:href="@{/}" class="logo">
      <span class="logo-mark">하</span>
      하루
    </a>
    <nav class="nav-actions">
      <th:block th:if="${session.loginUser == null}">
        <a th:href="@{/user/login}"  class="btn btn-ghost">로그인</a>
        <a th:href="@{/user/register}" class="btn btn-primary">회원가입</a>
      </th:block>
      <th:block th:if="${session.loginUser != null}">
        <a th:href="@{/post/create}" class="btn btn-primary">✏ 글쓰기</a>
        <a th:href="@{/user/mypage}" class="avatar"
           th:data-avatar="${session.loginUser.nickname}"
           th:title="${session.loginUser.nickname}">
          <span th:text="${#strings.substring(session.loginUser.nickname,0,1)}"></span>
        </a>
      </th:block>
    </nav>
  </div>
</header>

</html>
