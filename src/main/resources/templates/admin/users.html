<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/header :: head('회원 관리')}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: topbar}"></th:block>

<div class="layout">
  <th:block th:replace="~{fragments/header :: sidebar('admin')}"></th:block>

  <main class="main">
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h1 class="page-title">회원 관리</h1>
      <a th:href="@{/admin}" class="btn btn-ghost btn-sm">← 대시보드</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="detail-card" style="padding:0;overflow:hidden;">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>닉네임</th>
            <th>이메일</th>
            <th>가입 방식</th>
            <th>가입일</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${users.content}">
            <td th:text="${u.id}">1</td>
            <td th:text="${u.nickname}">닉네임</td>
            <td th:text="${u.email}">이메일</td>
            <td th:text="${u.provider}">local</td>
            <td th:text="${u.createdAt != null} ? ${#temporals.format(u.createdAt,'yyyy.MM.dd')} : '-'">날짜</td>
            <td>
              <form th:action="@{/admin/users/{id}/delete(id=${u.id})}" method="post"
                    onsubmit="return confirm('정말 삭제하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <nav class="pagination" th:if="${users.totalPages > 1}">
      <a th:href="@{/admin/users(page=${currentPage-1})}" class="page-btn"
         th:classappend="${currentPage==1} ? 'disabled'">‹</a>
      <a th:each="i : ${#numbers.sequence(1, users.totalPages)}"
         th:href="@{/admin/users(page=${i})}" th:text="${i}" class="page-btn"
         th:classappend="${i==currentPage} ? 'active'">1</a>
      <a th:href="@{/admin/users(page=${currentPage+1})}" class="page-btn"
         th:classappend="${users.totalPages==currentPage} ? 'disabled'">›</a>
    </nav>
  </main>
</div>

<th:block th:replace="~{fragments/header :: footer}"></th:block>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
