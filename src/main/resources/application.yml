spring:
  application:
    name: asq

  datasource:
    url: jdbc:mariadb://localhost:3306/asq?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: asq
    password: ***REMOVED***
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ***REMOVED***
            client-secret: ***REMOVED***
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope: name, email, nickname
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB

server:
  tomcat:
    # 한도 초과 업로드도 끝까지 읽어 깔끔한 에러 응답을 보낸다 (커넥션 리셋 방지)
    max-swallow-size: -1

app:
  upload-dir: /home/ubuntu/uploads

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.asq.domain
  configuration:
    map-underscore-to-camel-case: true
